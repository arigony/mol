<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Diagnóstico de Rastreamento da Mão</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial,sans-serif}
  #video,#canvas{position:fixed;inset:0;width:100%;height:100%}
  #video{object-fit:cover;transform:scaleX(-1);z-index:1}
  #canvas{z-index:2;pointer-events:none}
  #ui{position:fixed;left:0;right:0;top:0;z-index:3;padding:calc(10px + env(safe-area-inset-top,0px)) 12px 10px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
  #msg{font-weight:700;margin-bottom:6px}
  #meter{height:16px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}
  #fill{height:100%;width:0%;background:linear-gradient(90deg,#00f2ff,#ffd700)}
  #overlay{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.92);padding:20px}
  .box{max-width:460px;text-align:center;background:rgba(20,20,20,.95);padding:20px;border-radius:20px;border:1px solid rgba(255,255,255,.14)}
  button{border:none;border-radius:999px;padding:14px 22px;font-size:1rem;font-weight:800;background:#00f2ff;color:#000}
</style>
</head>
<body>
<div id="overlay"><div class="box"><h2>Diagnóstico de mão no celular</h2><p>Este teste mostra apenas se o celular está detectando a mão. Ao abrir a mão, a barra deve subir.</p><button id="go">INICIAR TESTE</button></div></div>
<div id="ui"><div id="msg">Aguardando…</div><div id="meter"><div id="fill"></div></div></div>
<video id="video" playsinline webkit-playsinline muted autoplay></video>
<canvas id="canvas"></canvas>
<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/vision_bundle.mjs";
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const go=document.getElementById('go');
const msg=document.getElementById('msg');
const fill=document.getElementById('fill');
let tracker=null, raf=0, running=false, last=0, val=0;
function resize(){canvas.width=innerWidth; canvas.height=innerHeight;}
function op(hand){
 const w=hand[0], i=hand[5], p=hand[17];
 const palm=(Math.hypot(w.x-i.x,w.y-i.y)+Math.hypot(w.x-p.x,w.y-p.y))/2||0.0001;
 const tips=[hand[8],hand[12],hand[16],hand[20]];
 const avg=tips.reduce((a,t)=>a+Math.hypot(w.x-t.x,w.y-t.y),0)/4;
 return Math.max(0, Math.min(1, (avg/palm-1.15)/1.55));
}
function loop(now){
 if(!running)return;
 if(video.readyState>=2 && now-last>90){
  last=now;
  try{
   const r=tracker.detectForVideo(video, now);
   ctx.clearRect(0,0,canvas.width,canvas.height);
   if(r?.landmarks?.length){
    val += (op(r.landmarks[0])-val)*0.2;
    msg.textContent='Mão detectada';
    fill.style.width=(val*100).toFixed(1)+'%';
    const hand=r.landmarks[0];
    ctx.strokeStyle='#00f2ff'; ctx.lineWidth=2;
    for(const pt of hand){ ctx.beginPath(); ctx.arc((1-pt.x)*canvas.width, pt.y*canvas.height, 5, 0, Math.PI*2); ctx.stroke(); }
   } else {
    msg.textContent='Sem mão detectada';
   }
  }catch(e){ msg.textContent='Erro no detector'; }
 }
 raf=requestAnimationFrame(loop);
}
go.onclick=async()=>{
 try{
  if(!isSecureContext) throw new Error('Abra em HTTPS');
  const vision=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm');
  tracker=await HandLandmarker.createFromOptions(vision,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate:'CPU'}, runningMode:'VIDEO', numHands:1, minHandDetectionConfidence:.25, minHandPresenceConfidence:.25, minTrackingConfidence:.25});
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user', width:{ideal:640}, height:{ideal:480}}, audio:false});
  video.srcObject=stream;
  await new Promise(res=>video.onloadedmetadata=async()=>{await video.play();res();});
  overlay.style.display='none'; running=true; resize(); loop(performance.now());
 }catch(e){ alert(e.message); }
};
addEventListener('resize',resize); resize();
</script>
</body>
</html>
